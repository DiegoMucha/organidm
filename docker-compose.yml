services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: organidm-caddy
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: organidm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://organidm:organidm@postgres:5432/organidm
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: organidm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: organidm
      POSTGRES_USER: organidm
      POSTGRES_PASSWORD: organidm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organidm -d organidm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
